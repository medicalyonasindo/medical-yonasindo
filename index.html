<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Divisi Medical - LPK Yonasindo Intra Pratama</title>
    <style>
        :root { 
            --primary: #346739; --secondary: #79AE6F; --light-green: #9FCB98;
            --danger: #e74c3c; --dark: #1e3a1f; --warning: #f1c40f; 
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f4; margin: 0; padding: 0; }
        .auth-container { max-width: 400px; margin: 80px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        .main-app { display: none; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        /* Tab Styling */
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--light-green); padding-bottom: 10px; }
        .tab-btn { padding: 12px 20px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; color: #666; transition: 0.3s; text-transform: uppercase; font-size: 12px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn#tabAdmin { background: var(--danger); color: white; display: none; }
        
        .page-content { display: none; }
        .page-content.active { display: block; }
        .section-box { background: white; padding: 20px; border-radius: 10px; border: 1px solid var(--light-green); margin-bottom: 20px; }
        
        /* Form & Table */
        .mcu-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input, select, button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { border-bottom: 1px solid #eee; padding: 12px; font-size: 13px; }
        
        .badge { padding: 5px 10px; border-radius: 4px; color: white; font-size: 11px; font-weight: bold; }
        .blur-text { filter: blur(5px); user-select: none; }
        .btn-sm { padding: 5px 10px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div id="authPage" class="auth-container">
    <h2 style="text-align:center; color:var(--primary)">Login Medical</h2>
    <div id="loginForm">
        <input type="text" id="uName" placeholder="Username" style="width:100%; margin-bottom:10px; box-sizing:border-box">
        <input type="password" id="uPass" placeholder="Password" style="width:100%; margin-bottom:15px; box-sizing:border-box">
        <button class="tab-btn active" style="width:100%" onclick="doLogin()">MASUK KE SISTEM</button>
    </div>
    <div style="text-align:center; margin-top:15px; font-size:13px">
        <a href="javascript:void(0)" onclick="toggleAuth()" id="switchLink" style="color:var(--primary)">Buat Akun Siswa</a>
    </div>
    <div id="registerForm" style="display:none; margin-top:15px">
        <input type="text" id="regFullName" placeholder="Nama Lengkap" style="width:100%; margin-bottom:10px; box-sizing:border-box">
        <input type="text" id="regUser" placeholder="Username Baru" style="width:100%; margin-bottom:10px; box-sizing:border-box">
        <input type="password" id="regPass" placeholder="Password Baru" style="width:100%; margin-bottom:10px; box-sizing:border-box">
        <button class="tab-btn" style="width:100%; background:var(--secondary); color:white" onclick="doRegister()">DAFTAR</button>
    </div>
</div>

<div id="appPage" class="main-app">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h3 style="color:var(--primary); margin:0">MEDICAL YONASINDO</h3>
            <div>
                <span id="displayUser" style="font-weight:bold; margin-right:15px"></span>
                <button onclick="logout()" style="background:#999; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer">LOGOUT</button>
            </div>
        </div>

        <div class="tab-menu" id="mainMenuBar">
            <button class="tab-btn active" id="btn-pengajuan" onclick="openTab('pengajuan')">FORM MCU</button>
            <button class="tab-btn" id="tab-status-saya" onclick="openTab('status-saya')">PENGAJUAN SAYA</button>
            <button class="tab-btn" id="btn-hasil" onclick="openTab('hasil')">HASIL MCU</button>
            <button class="tab-btn" id="tabAdmin" onclick="openTab('admin')">DATABASE AKUN</button>
        </div>

        <div id="page-pengajuan" class="page-content active">
            <div class="section-box">
                <form id="formMcu" class="mcu-form">
                    <input type="text" id="nama" placeholder="Nama Lengkap" required>
                    <input type="text" id="noHp" placeholder="No HP" required>
                    <input type="text" id="kumiai" placeholder="Nama Kumiai" required>
                    <select id="klinik" required>
                        <option value="" disabled selected>Pilih Klinik</option>
                        <option value="Klinik Galaxy Medical Center">Klinik Galaxy Medical Center</option>
                        <option value="Klinik Rosela Indah Medikal Center">Klinik Rosela Indah Medikal Center</option>
                    </select>
                    <select id="tipeMcu" required>
                        <option value="" disabled selected>Jenis MCU</option>
                        <option value="MCU PRA">MCU PRA</option>
                        <option value="MCU FULL">MCU FULL</option>
                        <option value="MCU AKHIR">MCU AKHIR</option>
                    </select>
                    <button type="submit" style="background:var(--primary); color:white; font-weight:bold">KIRIM PENGAJUAN</button>
                </form>
            </div>
            <div id="adminQueue" style="display:none">
                <h4 style="color:var(--danger)">Antrean Persetujuan (Admin)</h4>
                <table>
                    <thead><tr><th>Nama</th><th>Klinik</th><th>Kumiai</th><th>Aksi</th></tr></thead>
                    <tbody id="listPending"></tbody>
                </table>
            </div>
        </div>

        <div id="page-status-saya" class="page-content">
            <div class="section-box">
                <h4>Riwayat Pengajuan Anda</h4>
                <div id="myStatusList"></div>
            </div>
        </div>

        <div id="page-hasil" class="page-content">
            <div class="section-box">
                <h4>Data Hasil MCU</h4>
                <input type="text" id="search" placeholder="Cari nama..." onkeyup="loadData()" style="width:100%; margin-bottom:15px; box-sizing:border-box">
                <table>
                    <thead><tr><th>Tgl MCU</th><th>Nama</th><th>Klinik</th><th>Hasil</th><th class="adm-col">Opsi</th></tr></thead>
                    <tbody id="listHasil"></tbody>
                </table>
            </div>
        </div>

        <div id="page-admin" class="page-content">
            <div class="section-box">
                <h4>Database User</h4>
                <tbody id="listUser"></tbody>
                <table id="userTable">
                    <thead><tr><th>Nama</th><th>Username</th><th>Aksi</th></tr></thead>
                    <tbody id="tbodyUser"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const ADMIN_CRED = { user: "adminmcuyonasindo", pass: "adminmcuyonasindo" };
    let users = JSON.parse(localStorage.getItem("Y_USERS")) || [];
    let records = JSON.parse(localStorage.getItem("Y_RECORDS")) || [];
    let currentUser = JSON.parse(localStorage.getItem("Y_SESSION")) || null;

    if(currentUser) enterApp();

    function doLogin() {
        const u = document.getElementById('uName').value.trim();
        const p = document.getElementById('uPass').value.trim();

        if(u === ADMIN_CRED.user && p === ADMIN_CRED.pass) {
            currentUser = { u: u, role: 'admin' };
        } else {
            let found = users.find(x => x.u === u && x.p === p);
            if(found) currentUser = { ...found, role: 'user' };
            else return alert("Salah Login!");
        }
        localStorage.setItem("Y_SESSION", JSON.stringify(currentUser));
        enterApp();
    }

    function enterApp() {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('appPage').style.display = 'block';
        
        const isAdmin = currentUser.role === 'admin';
        const disp = document.getElementById('displayUser');
        disp.innerText = isAdmin ? "MODE: ADMIN" : "USER: " + currentUser.u.toUpperCase();
        disp.style.color = isAdmin ? "red" : "green";

        // PROTEKSI MENU ADMIN
        document.getElementById('tab-status-saya').style.display = isAdmin ? 'none' : 'block';
        document.getElementById('tabAdmin').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('adminQueue').style.display = isAdmin ? 'block' : 'none';
        
        document.querySelectorAll('.adm-col').forEach(c => c.style.display = isAdmin ? 'table-cell' : 'none');

        if(isAdmin) openTab('pengajuan');
        loadData();
    }

    function openTab(id) {
        document.querySelectorAll('.page-content, .tab-btn').forEach(e => e.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        if(id === 'pengajuan') document.getElementById('btn-pengajuan').classList.add('active');
        if(id === 'status-saya') document.getElementById('tab-status-saya').classList.add('active');
        if(id === 'hasil') document.getElementById('btn-hasil').classList.add('active');
        if(id === 'admin') document.getElementById('tabAdmin').classList.add('active');
        loadData();
    }

    function loadData() {
        const isAdmin = currentUser.role === 'admin';
        const q = document.getElementById('search').value.toLowerCase();

        // 1. Pending (Admin Only)
        if(isAdmin) {
            const pnd = records.filter(r => r.status === 'pending');
            document.getElementById('listPending').innerHTML = pnd.map(r => `<tr><td>${r.nama}</td><td>${r.klinik}</td><td>${r.kumiai}</td><td><button class="btn-sm" style="background:green;color:white" onclick="approve(${r.id})">Approve</button></td></tr>`).join('');
            
            document.getElementById('tbodyUser').innerHTML = users.map(u => `<tr><td>${u.name}</td><td>${u.u}</td><td><button onclick="hapusU('${u.u}')">Hapus</button></td></tr>`).join('');
        }

        // 2. My Status (User Only)
        if(!isAdmin) {
            const mine = records.filter(r => r.owner === currentUser.u);
            document.getElementById('myStatusList').innerHTML = mine.length ? mine.map(m => `<div style="border-bottom:1px solid #eee; padding:10px"><b>${m.klinik}</b> - Status: ${m.status.toUpperCase()}</div>`).join('') : "Belum ada pengajuan.";
        }

        // 3. Hasil (Global)
        const apprv = records.filter(r => r.status === 'approved' && r.nama.toLowerCase().includes(q));
        document.getElementById('listHasil').innerHTML = apprv.map(r => {
            const blur = (isAdmin || r.owner === currentUser.u) ? '' : 'blur-text';
            return `<tr><td>${r.tglMcu}</td><td>${r.nama}</td><td>${r.klinik}</td><td><span class="badge ${blur}" style="background:orange">${r.hasil}</span></td><td class="adm-col" style="${isAdmin?'':'display:none'}"><button onclick="setHasil(${r.id})">Hasil</button></td></tr>`;
        }).join('');
    }

    document.getElementById('formMcu').onsubmit = function(e) {
        e.preventDefault();
        records.push({
            id: Date.now(), owner: currentUser.u,
            nama: document.getElementById('nama').value,
            noHp: document.getElementById('noHp').value,
            kumiai: document.getElementById('kumiai').value,
            klinik: document.getElementById('klinik').value,
            tipe: document.getElementById('tipeMcu').value,
            status: 'pending', hasil: 'PROSES', tglMcu: '-'
        });
        localStorage.setItem("Y_RECORDS", JSON.stringify(records));
        alert("Berhasil dikirim!");
        this.reset();
        loadData();
    };

    function approve(id) {
        const t = prompt("Masukkan Tanggal MCU (Contoh: 12/03/2024):");
        if(!t) return;
        const i = records.findIndex(x => x.id === id);
        records[i].status = 'approved';
        records[i].tglMcu = t;
        localStorage.setItem("Y_RECORDS", JSON.stringify(records));
        loadData();
    }

    function setHasil(id) {
        const h = prompt("1:Fit, 2:Note, 3:Unfit");
        const i = records.findIndex(x => x.id === id);
        if(h==='1') records[i].hasil = "FIT";
        if(h==='2') records[i].hasil = "FIT WITH NOTE";
        if(h==='3') records[i].hasil = "UNFIT";
        localStorage.setItem("Y_RECORDS", JSON.stringify(records));
        loadData();
    }

    function toggleAuth() {
        const rf = document.getElementById('registerForm');
        rf.style.display = rf.style.display === 'none' ? 'block' : 'none';
    }

    function doRegister() {
        users.push({ u: document.getElementById('regUser').value, p: document.getElementById('regPass').value, name: document.getElementById('regFullName').value });
        localStorage.setItem("Y_USERS", JSON.stringify(users));
        alert("Berhasil Daftar!"); location.reload();
    }

    function logout() { localStorage.removeItem("Y_SESSION"); location.reload(); }
</script>
</body>
</html>
