<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisi Medical - LPK Yonasindo Intra Pratama</title>
    <style>
        :root { 
            --primary: #346739; --secondary: #79AE6F; --light-green: #9FCB98;
            --danger: #e74c3c; --dark: #1e3a1f; --warning: #f1c40f; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f4; margin: 0; padding: 0; }
        
        /* LOADING */
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; font-weight: bold; color: var(--primary); flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* AUTH PAGE */
        .auth-container { max-width: 450px; margin: 60px auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        .auth-container h2 { text-align: center; color: var(--primary); margin-top: 0; margin-bottom: 5px; }
        .auth-container input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        /* APP LAYOUT */
        .main-app { display: none; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--light-green); padding-bottom: 10px; overflow-x: auto; }
        .tab-btn { padding: 12px 25px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; color: #666; transition: 0.3s; white-space: nowrap; text-transform: uppercase; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        .section-box { background: #ffffff; padding: 20px; border-radius: 10px; border: 1px solid var(--light-green); margin-bottom: 25px; }
        .mcu-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; font-weight: bold; color: var(--primary); }
        input, select, button { padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: var(--primary); color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { border-bottom: 1px solid #edf2ed; padding: 12px; font-size: 13px; }

        .blur-text { filter: blur(6px); user-select: none; opacity: 0.5; }
        .badge { padding: 6px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; color: white; text-transform: uppercase; }
        .fit { background: #27ae60; } .note { background: #f39c12; } .unfit { background: #c0392b; } .wait { background: #95a5a6; }

        .btn { cursor: pointer; border: none; font-weight: bold; color: white; padding: 10px 15px; border-radius: 8px; }
        .btn-primary { background-color: var(--primary); }
        .btn-success { background-color: var(--secondary); }
        .btn-danger { background-color: var(--danger); }
        .btn-warning { background-color: var(--warning); color: #333; }
        .btn-sm { padding: 6px 10px; font-size: 12px; }

        @media (max-width: 600px) { .mcu-form { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay"><div class="spinner"></div><span>Sinkronisasi Data Online...</span></div>

<div id="authPage" class="auth-container">
    <h2>Login Medical</h2>
    <p style="text-align:center; font-size:12px; color: #666; margin-bottom:20px;">LPK YONASINDO INTRA PRATAMA</p>
    
    <div id="loginForm">
        <input type="text" id="uName" placeholder="Username">
        <input type="password" id="uPass" placeholder="Password">
        <button class="btn btn-primary" style="width: 100%; margin-top:10px;" onclick="doLogin()">MASUK KE SISTEM</button>
    </div>

    <div id="registerForm" style="display:none;">
        <input type="text" id="regFullName" placeholder="Nama Lengkap">
        <input type="text" id="regEmail" placeholder="Email">
        <input type="text" id="regPhone" placeholder="Nomor HP">
        <input type="text" id="regUser" placeholder="Username Baru">
        <input type="password" id="regPass" placeholder="Password Baru">
        <button class="btn btn-success" style="width: 100%; margin-top: 10px;" onclick="doRegister()">DAFTAR SEKARANG</button>
    </div>
    
    <div style="text-align: center; margin-top: 20px;"><a href="javascript:void(0)" onclick="toggleAuth()" id="switchLink" style="color:var(--primary); font-weight:bold; text-decoration:none">Buat Akun Siswa</a></div>
</div>

<div id="appPage" class="main-app">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h3 style="color:var(--primary); margin:0">LPK YONASINDO INTRA PRATAMA</h3>
            <div><span id="displayUser" style="font-weight:bold; margin-right:10px;"></span><button class="btn btn-sm" style="background:#95a5a6" onclick="logout()">LOGOUT</button></div>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" id="tab-pengajuan" onclick="openTab('pengajuan')">FORM MCU</button>
            <button class="tab-btn" id="tab-status" onclick="openTab('status-saya')">STATUS SAYA</button>
            <button class="tab-btn" id="tab-hasil" onclick="openTab('hasil')">HASIL MCU</button>
            <button class="tab-btn" id="tabAdmin" onclick="openTab('admin')" style="display:none; background: var(--danger); color: white;">DATABASE USER</button>
        </div>

        <div id="page-pengajuan" class="page-content active">
            <div class="section-box">
                <form id="formMcu" class="mcu-form">
                    <div class="input-group"><label>Nama Lengkap</label><input type="text" id="nama" required></div>
                    <div class="input-group"><label>Nomor HP</label><input type="text" id="noHp" required></div>
                    <div class="input-group"><label>Tanggal Lahir</label><input type="date" id="tglLahir" required></div>
                    <div class="input-group"><label>Nama Kumiai</label><input type="text" id="kumiai" required></div>
                    <div class="input-group">
                        <label>Pilih Klinik</label>
                        <select id="klinik" required>
                            <option value="" disabled selected>-- Pilih Klinik --</option>
                            <option value="Klinik Galaxy Medical Center">Klinik Galaxy Medical Center</option>
                            <option value="Klinik Rosela Indah Medikal Center">Klinik Rosela Indah Medikal Center</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Jenis MCU</label>
                        <select id="tipeMcu" required>
                            <option value="" disabled selected>-- Pilih Jenis MCU --</option>
                            <option value="MCU PRA">MCU PRA</option>
                            <option value="MCU FULL">MCU FULL</option>
                            <option value="MCU AKHIR">MCU AKHIR</option>
                        </select>
                    </div>
                    <div style="margin-top: 10px;"><button type="submit" class="btn btn-primary">KIRIM PENGAJUAN</button></div>
                </form>
            </div>
            
            <div id="adminApprovalUI" style="display:none">
                <h4 style="color:var(--danger)">Antrean Pengajuan (Admin)</h4>
                <table>
                    <thead><tr><th>Tgl Daftar</th><th>Nama</th><th>Klinik</th><th>Jenis</th><th>Aksi</th></tr></thead>
                    <tbody id="listPending"></tbody>
                </table>
            </div>
        </div>

        <div id="page-status-saya" class="page-content">
            <div class="section-box">
                <h4>Riwayat Pengajuan Saya</h4>
                <div id="myStatusContent"></div>
            </div>
        </div>

        <div id="page-hasil" class="page-content">
            <div class="section-box">
                <h4>Database Hasil MCU</h4>
                <input type="text" id="search" placeholder="Cari Nama Siswa..." onkeyup="renderTables()" style="width:100%; margin-bottom:15px">
                <div style="overflow-x:auto">
                    <table>
                        <thead><tr><th>Tgl MCU</th><th>Nama</th><th>Klinik</th><th>Jenis</th><th>Hasil</th><th class="adm-col" style="display:none">Opsi</th></tr></thead>
                        <tbody id="listHasil"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-admin" class="page-content">
            <div class="section-box">
                <h4>Database User</h4>
                <div style="overflow-x:auto">
                    <table>
                        <thead><tr><th>Nama</th><th>User</th><th>Pass</th><th>Aksi</th></tr></thead>
                        <tbody id="listUser"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQYBpd8PtZwdHBl5s2CaQOkwN6RC1e_feVrGFae87Ug7qhncasW6YyEa5ItuevAoT1Pg/exec"; 
    
    const ADMIN_CRED = { user: "adminmcuyonasindo", pass: "adminmcuyonasindo" };
    let users = [];
    let records = [];
    let currentUser = JSON.parse(localStorage.getItem("Y_SESSION")) || null;

    if(currentUser) { enterApp(); syncData(); }

    function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

    async function syncData() {
        showLoader(true);
        try {
            const resU = await fetch(SCRIPT_URL + "?action=readUsers");
            const rawU = await resU.json();
            users = rawU.map(u => ({ name: u[0], u: u[1], p: u[2], email: u[3], phone: u[4] }));

            const resR = await fetch(SCRIPT_URL + "?action=readRecords");
            const rawR = await resR.json();
            records = rawR.map(r => ({
                id: r[0], owner: r[1], nama: r[2], noHp: r[3], kumiai: r[4], 
                klinik: r[5], tipe: r[6], status: r[7], hasil: r[8], 
                tglMcu: r[9], tglInput: r[10], timestamp: r[11]
            }));
            renderTables();
        } catch(e) { console.error("Sync Error:", e); }
        showLoader(false);
    }

    async function doLogin() {
        const u = document.getElementById('uName').value.trim();
        const p = document.getElementById('uPass').value.trim();
        showLoader(true);
        
        if(u === ADMIN_CRED.user && p === ADMIN_CRED.pass) {
            currentUser = { u, role: 'admin' };
        } else {
            // Re-sync users for login
            const resU = await fetch(SCRIPT_URL + "?action=readUsers");
            const rawU = await resU.json();
            const found = rawU.find(x => x[1] == u && x[2] == p);
            if(found) currentUser = { u, role: 'user' };
            else { showLoader(false); return alert("Username/Password Salah!"); }
        }
        
        localStorage.setItem("Y_SESSION", JSON.stringify(currentUser));
        enterApp();
        syncData();
    }

    function enterApp() {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('appPage').style.display = 'block';
        const isAdmin = currentUser.role === 'admin';
        document.getElementById('displayUser').innerText = currentUser.u.toUpperCase();
        document.getElementById('adminApprovalUI').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('tabAdmin').style.display = isAdmin ? 'block' : 'none';
        document.querySelectorAll('.adm-col').forEach(el => el.style.display = isAdmin ? 'table-cell' : 'none');
    }

    function renderTables() {
        const isAdmin = currentUser.role === 'admin';
        const q = document.getElementById('search').value.toLowerCase();

        // Riwayat Saya
        const mine = records.filter(r => r.owner === currentUser.u);
        document.getElementById('myStatusContent').innerHTML = mine.map(r => `
            <div style="border-bottom:1px solid #eee; padding:10px;">
                <b>${r.klinik}</b> - Status: <span class="badge ${r.status==='pending'?'wait':'fit'}">${r.status}</span><br>
                <small>Hasil: ${r.hasil} | Jadwal: ${r.tglMcu}</small>
            </div>`).join('') || "Belum ada pengajuan.";

        // Pending Admin
        if(isAdmin) {
            const pending = records.filter(r => r.status === 'pending');
            document.getElementById('listPending').innerHTML = pending.map(r => `
                <tr><td>${r.tglInput}</td><td>${r.nama}</td><td>${r.klinik}</td><td>${r.tipe}</td>
                <td><button class="btn btn-sm btn-success" onclick="approve(${r.id})">APPROVE</button></td></tr>`).join('');
            
            document.getElementById('listUser').innerHTML = users.map(u => `
                <tr><td>${u.name}</td><td>${u.u}</td><td>${u.p}</td>
                <td><button class="btn btn-sm btn-danger" onclick="alert('Hapus manual di Sheets')">HAPUS</button></td></tr>`).join('');
        }

        // Hasil Global
        const approved = records.filter(r => r.status === 'approved' && r.nama.toLowerCase().includes(q));
        document.getElementById('listHasil').innerHTML = approved.map(r => {
            const noBlur = isAdmin || r.owner === currentUser.u;
            return `<tr><td>${r.tglMcu}</td><td>${r.nama}</td><td>${r.klinik}</td><td>${r.tipe}</td>
            <td class="${noBlur?'':'blur-text'}"><span class="badge fit">${r.hasil}</span></td>
            <td class="adm-col" style="${isAdmin?'':'display:none'}"><button class="btn btn-sm btn-warning" onclick="setHasil(${r.id})">HASIL</button></td></tr>`;
        }).join('');
    }

    document.getElementById('formMcu').onsubmit = async function(e) {
        e.preventDefault();
        showLoader(true);
        const dataBaru = [
            Date.now(), currentUser.u, 
            document.getElementById('nama').value, 
            document.getElementById('noHp').value, 
            "-", // Kumiai placeholder
            document.getElementById('klinik').value, 
            document.getElementById('tipeMcu').value, 
            "pending", "PROSES", "-", 
            new Date().toLocaleDateString('id-ID'), Date.now()
        ];

        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ table: "records", action: "insert", data: dataBaru })
        });
        
        alert("Pengajuan Berhasil!");
        this.reset();
        await syncData();
        openTab('status-saya');
    };

    async function approve(id) {
        const tgl = prompt("Input Tanggal MCU:");
        if(!tgl) return;
        showLoader(true);
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ table: "records", action: "update", id: id, status: "approved", tglMcu: tgl })
        });
        await syncData();
    }

    async function setHasil(id) {
        const h = prompt("1:Fit, 2:Note, 3:Unfit");
        let val = h==="1"?"Fit to Work":(h==="2"?"Fit with Note":"Unfit");
        showLoader(true);
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ table: "records", action: "update", id: id, hasil: val })
        });
        await syncData();
    }

    async function doRegister() {
        const u = document.getElementById('regUser').value.trim();
        const p = document.getElementById('regPass').value.trim();
        const n = document.getElementById('regFullName').value.trim();
        showLoader(true);
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ table: "users", action: "insert", data: [n, u, p, "-", "-"] })
        });
        alert("Daftar Berhasil! Silakan Login.");
        location.reload();
    }

    function openTab(id) {
        document.querySelectorAll('.page-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.getElementById('tab-' + id).classList.add('active');
    }

    function toggleAuth() {
        const isLogin = document.getElementById('loginForm').style.display !== 'none';
        document.getElementById('loginForm').style.display = isLogin ? 'none' : 'block';
        document.getElementById('registerForm').style.display = isLogin ? 'block' : 'none';
    }

    function logout() { localStorage.removeItem("Y_SESSION"); location.reload(); }
</script>
</body>
</html>
